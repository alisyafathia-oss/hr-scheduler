name: Scheduled Sync

on:
  # Runs daily at 7:00 AM UTC — mirrors the original Netlify cron schedule.
  schedule:
    - cron: "0 7 * * *"
  # Allow manual trigger from the GitHub Actions UI.
  workflow_dispatch:

jobs:
  sync:
    name: Trigger HR Scheduler Sync
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/internal/sync"
