# Cloudflare Pages configuration for HR Scheduler
# Deploy via: Cloudflare Pages Dashboard → Connect to GitHub repo
#
# Required environment variables (set in Cloudflare Pages dashboard):
#   GOOGLE_SERVICE_ACCOUNT_EMAIL
#   GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
#   CONTRACTS_SHEET_ID
#   PEOPLE_MASTER_SHEET_ID
#   SCHEDULER_SHEET_ID
#   HR_CALENDAR_ID
#   SESSION_SECRET
#   APP_URL                   ← your Cloudflare Pages URL, e.g. https://hr-scheduler.pages.dev
#   HR_ADMIN_EMAILS
#   HR_ADMIN_PASSWORD_HASH
#   HR_ADMIN_PASSWORD_SALT
#   M365_USER
#   M365_PASSWORD
#   VOTE_WINDOW_HOURS         ← default: 24
#   CRON_SECRET               ← random secret for the GitHub Actions scheduled sync

name = "hr-scheduler"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "public"

# Non-sensitive configuration — safe to commit to git.
# Secrets (private key, passwords, session secret) must be set via
# the Cloudflare Pages dashboard → Settings → Environment variables.
[vars]
APP_URL                  = "https://hr-scheduler.pages.dev"
VOTE_WINDOW_HOURS        = "24"
GOOGLE_SERVICE_ACCOUNT_EMAIL = "hr-scheduler-sa@hr-scheduler-492002.iam.gserviceaccount.com"
CONTRACTS_SHEET_ID       = "1zViTedoHHJ9aXtc6VaatO2vIBcwrIVAb_MO4EY3oKms"
PEOPLE_MASTER_SHEET_ID   = "1Z3enMrx1ET9xH7wZ3HEGxNUnC91GC3fz-M7JiZIGcSo"
SCHEDULER_SHEET_ID       = "1BzQKTNzQ1YebiQ6ebG-nlsEkYxTqe2qC"
HR_CALENDAR_ID           = "gtoljnr0h7r8opu97mfm7ukalg@group.calendar.google.com"
HR_ADMIN_EMAILS          = "hradmin@crescentrating.com"
